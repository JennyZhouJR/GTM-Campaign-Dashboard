name: Auto Follow-Up Emails (DISABLED — moved to Jobright-Campaign-Dashboard)

# ⚠️ DISABLED 2026-04-25
#
# The canonical version of this cron now lives in the new dashboard repo:
#   https://github.com/JennyZhouJR/Jobright-Campaign-Dashboard
#   .github/workflows/auto_followup.yml
#
# This file is kept (workflow_dispatch only) so we can manually fall back
# to running it from this repo if the new one breaks for some reason.
# The `schedule:` cron has been removed so it won't auto-fire — only the
# new repo runs daily.

on:
  workflow_dispatch:  # manual rollback trigger only — no automatic cron

jobs:
  followup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install gspread oauth2client pandas
      - name: Run auto follow-up
        env:
          GSHEET_CREDENTIALS: ${{ secrets.GSHEET_CREDENTIALS }}
          GMAIL_JENNY_PASSWORD: ${{ secrets.GMAIL_JENNY_PASSWORD }}
          GMAIL_DORIS_PASSWORD: ${{ secrets.GMAIL_DORIS_PASSWORD }}
          GMAIL_JIALIN_PASSWORD: ${{ secrets.GMAIL_JIALIN_PASSWORD }}
        run: python auto_followup.py
