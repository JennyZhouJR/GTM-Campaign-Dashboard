name: Sync 24hr Views + ER

on:
  schedule:
    # Run daily at 9am EST (2pm UTC) — gives 24h window after a post
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install gspread oauth2client pandas apify-client python-dotenv
      - name: Run sync views
        env:
          GSHEET_CREDENTIALS: ${{ secrets.GSHEET_CREDENTIALS }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python sync_views.py
